name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history required for Source Link

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Format check
        run: dotnet format --no-restore --verify-no-changes --severity warn

      - name: Test
        run: >
          dotnet test
          --project tests/Umbrace.Totp.Tests/Umbrace.Totp.Tests.csproj
          --configuration Release
          --no-build
          --
          --report-trx
          --coverage
          --coverage-output-format cobertura
          --coverage-output coverage.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: "**/coverage.xml"
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
